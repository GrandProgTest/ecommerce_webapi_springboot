<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <title>Password Reset</title></head>
<body style='font-family:Arial;max-width:600px;margin:0 auto;padding:20px'>
<div style='background:#4CAF50;color:white;padding:20px;text-align:center'><h1>Password Reset</h1></div>
<div style='background:#f9f9f9;padding:30px'><p>Hello {{userName}},</p>
    <p>Click to reset: <a href='{{resetLink}}'>Reset Password</a></p>
    <p>Link expires in {{expirationMinutes}} minutes.</p></div>
<div style='text-align:center;padding:20px;color:#777;font-size:12px'><p>© 2026 E-Commerce Store</p></div>
</body>
</html>
